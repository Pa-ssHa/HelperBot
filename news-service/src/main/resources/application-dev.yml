services:
  user-vacancy:
    url: http://localhost:8082
  gateway:
    url: http://localhost:8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5050/helperbot
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none

newsapi:
  api-key: ${NEWS_API_KEY}
  url: https://newsapi.org/v2/everything
  language: ru
  page-size: 10

news:
  notifications:
    cron: "0 0 9,20 * * *"
    zone: Europe/Moscow
