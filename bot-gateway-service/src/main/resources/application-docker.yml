spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/helperbot
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
    connect-retries: 3

telegram:
  bot:
    username: ${TELEGRAM_BOT_USERNAME}
    token: ${TELEGRAM_BOT_TOKEN}

services:
  user-vacancy:
    url: http://user-vacancy-service:8082
  ai-resume:
    url: http://ai-resume-service:8081
  news:
    url: http://news-service:8083
