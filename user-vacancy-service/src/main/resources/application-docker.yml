spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/helperbot
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
  data:
    redis:
      host: redis
      port: 6379

hh:
  access:
    token: ${HH_ACCESS_TOKEN}

services:
  gateway:
    url: http://bot-gateway-service:8080

vacancy:
  notifications:
    delay-ms: 180000
    initial-delay-ms: 60000
    lookback-minutes: 3
